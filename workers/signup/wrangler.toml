name = "clipper-signup-api"
main = "src/index.ts"
compatibility_date = "2024-08-01"

# Create KV: wrangler kv namespace create SIGNUP_KV
# Paste the id below before deploying.
[[kv_namespaces]]
binding = "SIGNUP_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
FROM_EMAIL = "Clipper <onboarding@resend.dev>"
ALLOWED_ORIGINS = "https://joelnishanth.github.io,http://127.0.0.1:8080,http://localhost:8080"

# Secrets (wrangler secret put):
# RESEND_API_KEY
# CODE_SECRET — random string used to hash OTP codes
# FORMSPREE_ENDPOINT — optional; e.g. https://formspree.io/f/xlgvppoa

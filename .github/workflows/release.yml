name: Release Clipper

on:
  workflow_dispatch:
    inputs:
      version:
        description: Marketing version (SemVer, e.g. 0.1.0)
        required: true
        default: "0.1.0"
      build_number:
        description: Build number (monotonic integer)
        required: true
        default: "1"
      release_notes:
        description: Release notes (markdown)
        required: false
        default: "Bug fixes and improvements."

permissions:
  contents: write

concurrency:
  group: clipper-release
  cancel-in-progress: false

env:
  APP_NAME: "Offlyn Clipper"
  BUNDLE_ID: ai.offlyn.clipper
  TEAM_ID: T8V4M25H2P
  SIGNING_IDENTITY: "Developer ID Application: ANDESMAYA LLC (T8V4M25H2P)"
  SOURCE_REPO: rahulraonatarajan/offlyn-clipper

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout clipper-website
        uses: actions/checkout@v4

      - name: Configure SSH deploy key
        env:
          DEPLOY_KEY: ${{ secrets.OFFLYN_CLIPPER_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone offlyn-clipper source
        run: |
          git clone --depth 1 git@github.com:${SOURCE_REPO}.git source

      - name: Install build tools
        run: |
          brew install xcodegen create-dmg

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          security create-keychain -p temp "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p temp "$KEYCHAIN"
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp "$KEYCHAIN"

      - name: Set version numbers
        env:
          VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          cd source/OfflynClipper
          sed -i '' "s/MARKETING_VERSION: \".*\"/MARKETING_VERSION: \"${VERSION}\"/" project.yml
          sed -i '' "s/CURRENT_PROJECT_VERSION: \".*\"/CURRENT_PROJECT_VERSION: \"${BUILD_NUMBER}\"/" project.yml

      - name: Generate Xcode project
        run: |
          cd source/OfflynClipper
          xcodegen generate

      - name: Resolve package dependencies
        run: |
          cd source/OfflynClipper
          xcodebuild -scheme OfflynClipper -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            -resolvePackageDependencies

      - name: Archive Release build
        run: |
          cd source/OfflynClipper
          xcodebuild archive \
            -scheme OfflynClipper \
            -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            -archivePath "$GITHUB_WORKSPACE/build/Clipper.xcarchive" \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export signed app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$GITHUB_WORKSPACE/build/Clipper.xcarchive" \
            -exportOptionsPlist "$GITHUB_WORKSPACE/ExportOptions.plist" \
            -exportPath "$GITHUB_WORKSPACE/build/export"

      - name: Notarize app bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          APP_PATH="$GITHUB_WORKSPACE/build/export/${APP_NAME}.app"
          ditto -c -k --keepParent "$APP_PATH" "$GITHUB_WORKSPACE/build/export/${APP_NAME}.zip"
          xcrun notarytool submit "$GITHUB_WORKSPACE/build/export/${APP_NAME}.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        env:
          VERSION: ${{ inputs.version }}
        run: |
          APP_PATH="$GITHUB_WORKSPACE/build/export/${APP_NAME}.app"
          DMG_PATH="$GITHUB_WORKSPACE/release/Clipper-${VERSION}.dmg"
          mkdir -p "$GITHUB_WORKSPACE/release"
          create-dmg \
            --volname "Clipper" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon "${APP_NAME}.app" 150 190 \
            --app-drop-link 450 190 \
            "$DMG_PATH" \
            "$APP_PATH"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          VERSION: ${{ inputs.version }}
        run: |
          DMG_PATH="$GITHUB_WORKSPACE/release/Clipper-${VERSION}.dmg"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp "$DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          cp "$DMG_PATH" "$GITHUB_WORKSPACE/release/Clipper-latest.dmg"

      - name: Generate appcast.xml
        env:
          SPARKLE_ED25519_KEY: ${{ secrets.SPARKLE_ED25519_KEY }}
        run: |
          SPARKLE_BIN=$(find "$GITHUB_WORKSPACE/DerivedData" -path "*/artifacts/sparkle/Sparkle/bin" 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            echo "Sparkle tools not found under DerivedData" >&2
            exit 1
          fi
          echo "$SPARKLE_ED25519_KEY" > "$GITHUB_WORKSPACE/sparkle_private_key"
          chmod 600 "$GITHUB_WORKSPACE/sparkle_private_key"
          "$SPARKLE_BIN/generate_appcast" \
            --ed-key-file "$GITHUB_WORKSPACE/sparkle_private_key" \
            "$GITHUB_WORKSPACE/release"

      - name: Create GitHub Release
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --repo joelnishanth/clipper-website \
            --title "Clipper ${VERSION}" \
            --notes "${{ inputs.release_notes }}" \
            "$GITHUB_WORKSPACE/release/Clipper-${VERSION}.dmg" \
            "$GITHUB_WORKSPACE/release/Clipper-latest.dmg" \
            "$GITHUB_WORKSPACE/release/appcast.xml"

      - name: Enable download on website
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cat > download-status.json <<EOF
          {
            "available": true,
            "downloadUrl": "https://github.com/joelnishanth/clipper-website/releases/latest/download/Clipper-latest.dmg",
            "releasesUrl": "https://github.com/joelnishanth/clipper-website/releases",
            "pendingMessage": "We're experiencing a surge in demand right now. You've been added to the waitlist — we'll email you as soon as a download opens up."
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add download-status.json
          git diff --staged --quiet || git commit -m "Enable download for v${VERSION}"
          git push

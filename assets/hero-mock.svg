<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#27272a"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6E5CE1"/>
      <stop offset="1" stop-color="#7851E0"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#3f3f46"/>
      <stop offset="1" stop-color="#27272a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Window chrome -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="32" width="1200" height="656" rx="12" fill="#1e1e1e" stroke="#3f3f46" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="40" y="32" width="1200" height="36" rx="12" fill="#27272a"/>
  <rect x="40" y="56" width="1200" height="12" fill="#27272a"/>
  <circle cx="64" cy="50" r="6" fill="#52525b"/>
  <circle cx="84" cy="50" r="6" fill="#52525b"/>
  <circle cx="104" cy="50" r="6" fill="#52525b"/>
  <text x="640" y="54" text-anchor="middle" fill="#a1a1aa" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="600">Clipper</text>

  <!-- Sidebar -->
  <rect x="40" y="68" width="220" height="620" fill="url(#sidebar)"/>
  <rect x="40" y="68" width="220" height="620" fill="none" stroke="#3f3f46" stroke-width="1"/>

  <!-- Logo area -->
  <rect x="60" y="88" width="32" height="32" rx="6" fill="url(#accent)"/>
  <text x="102" y="108" fill="#f4f4f5" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="700">Clipper</text>

  <!-- Nav items -->
  <rect x="56" y="140" width="188" height="32" rx="6" fill="#6E5CE1" opacity="0.25"/>
  <rect x="60" y="144" width="4" height="24" rx="2" fill="#7851E0"/>
  <text x="76" y="162" fill="#f4f4f5" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="600">Meetings</text>

  <text x="76" y="198" fill="#a1a1aa" font-family="Plus Jakarta Sans, sans-serif" font-size="12">Notes</text>
  <text x="76" y="228" fill="#a1a1aa" font-family="Plus Jakarta Sans, sans-serif" font-size="12">Clips</text>
  <text x="76" y="258" fill="#a1a1aa" font-family="Plus Jakarta Sans, sans-serif" font-size="12">Nexus</text>
  <text x="76" y="288" fill="#a1a1aa" font-family="Plus Jakarta Sans, sans-serif" font-size="12">Search</text>
  <text x="76" y="318" fill="#a1a1aa" font-family="Plus Jakarta Sans, sans-serif" font-size="12">Settings</text>

  <!-- Main content -->
  <rect x="272" y="88" width="948" height="580" rx="8" fill="#18181b"/>

  <!-- Meeting detected banner -->
  <rect x="392" y="100" width="496" height="44" rx="22" fill="#3f3f46" stroke="#6E5CE1" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="418" cy="122" r="8" fill="#7851E0"/>
  <text x="436" y="118" fill="#f4f4f5" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="700">Meeting detected  Zoom</text>
  <text x="436" y="132" fill="#a1a1aa" font-family="Plus Jakarta Sans, sans-serif" font-size="9">Product sync ť 3 participants</text>
  <rect x="820" y="110" width="52" height="24" rx="6" fill="url(#accent)"/>
  <text x="846" y="126" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="700">Record</text>

  <!-- Transcript panel -->
  <rect x="292" y="160" width="560" height="488" rx="8" fill="#27272a" stroke="#3f3f46"/>
  <text x="312" y="188" fill="#f4f4f5" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="700">Live Transcript</text>
  <rect x="312" y="200" width="48" height="18" rx="4" fill="#6E5CE1" opacity="0.3"/>
  <text x="320" y="213" fill="#7851E0" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="600">Recording</text>

  <!-- Transcript lines -->
  <text x="312" y="240" fill="#7851E0" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600">Joel ť 00:12</text>
  <text x="312" y="258" fill="#d4d4d8" font-family="Plus Jakarta Sans, sans-serif" font-size="11">Let's prioritize the offline search pipeline for the next sprint.</text>

  <text x="312" y="288" fill="#8881C2" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600">Sarah ť 00:24</text>
  <text x="312" y="306" fill="#d4d4d8" font-family="Plus Jakarta Sans, sans-serif" font-size="11">Agreed  hybrid FTS5 plus vector fusion is the differentiator.</text>

  <text x="312" y="336" fill="#7851E0" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600">Joel ť 00:38</text>
  <text x="312" y="354" fill="#d4d4d8" font-family="Plus Jakarta Sans, sans-serif" font-size="11">Meeting detection should never auto-record without consent.</text>

  <text x="312" y="384" fill="#8881C2" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600">Sarah ť 00:51</text>
  <text x="312" y="402" fill="#d4d4d8" font-family="Plus Jakarta Sans, sans-serif" font-size="11">Banner plus one-tap start  Granola-style UX.</text>

  <!-- Waveform -->
  <rect x="312" y="580" width="520" height="48" rx="6" fill="#18181b"/>
  <polyline points="320,604 340,592 360,610 380,598 400,608 420,590 440,605 460,595 480,612 500,588 520,606 540,594 560,608 580,596 600,604 620,590 640,610 660,598 680,606 700,592 720,608 740,600 760,604 780,596 800,610 820,594" fill="none" stroke="#6E5CE1" stroke-width="2" stroke-linecap="round"/>

  <!-- Right panel - knowledge graph -->
  <rect x="872" y="160" width="328" height="488" rx="8" fill="#27272a" stroke="#3f3f46"/>
  <text x="892" y="188" fill="#f4f4f5" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="700">Nexus</text>

  <!-- Graph nodes -->
  <circle cx="960" cy="280" r="28" fill="#6E5CE1" opacity="0.8"/>
  <text x="960" y="284" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="700">Sprint</text>

  <circle cx="1080" cy="240" r="22" fill="#7851E0" opacity="0.7"/>
  <text x="1080" y="244" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-size="8">Search</text>

  <circle cx="1120" cy="340" r="20" fill="#50449F"/>
  <text x="1120" y="344" text-anchor="middle" fill="#e4e4e7" font-family="Plus Jakarta Sans, sans-serif" font-size="8">Notes</text>

  <circle cx="900" cy="360" r="18" fill="#4B34CB"/>
  <text x="900" y="364" text-anchor="middle" fill="#e4e4e7" font-family="Plus Jakarta Sans, sans-serif" font-size="7">Clips</text>

  <circle cx="1040" cy="420" r="24" fill="#6664E1" opacity="0.75"/>
  <text x="1040" y="424" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-size="8">Meetings</text>

  <!-- Graph edges -->
  <line x1="960" y1="280" x2="1080" y2="240" stroke="#8881C2" stroke-width="1.5" opacity="0.6"/>
  <line x1="960" y1="280" x2="1120" y2="340" stroke="#8881C2" stroke-width="1.5" opacity="0.6"/>
  <line x1="960" y1="280" x2="900" y2="360" stroke="#8881C2" stroke-width="1.5" opacity="0.6"/>
  <line x1="960" y1="280" x2="1040" y2="420" stroke="#8881C2" stroke-width="1.5" opacity="0.6"/>
  <line x1="1080" y1="240" x2="1120" y2="340" stroke="#8881C2" stroke-width="1" opacity="0.4"/>

  <!-- Chat bar -->
  <rect x="892" y="580" width="288" height="44" rx="22" fill="#3f3f46" stroke="#8881C2" stroke-width="1"/>
  <text x="912" y="606" fill="#71717a" font-family="Plus Jakarta Sans, sans-serif" font-size="11">Ask anything about your work&</text>
  <circle cx="1160" cy="602" r="14" fill="url(#accent)"/>
  <path d="M1155 602 L1163 602 L1160 606 Z" fill="white" transform="rotate(-90 1160 602)"/>
</svg>
